services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: enigmachamber-sql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${SA_PASSWORD:-EnigmaChamber_StrongPass123!}
    ports:
      - "${SQL_PORT:-1433}:1433"
    volumes:
      - sql_data:/var/opt/mssql
      - ./sql:/sql:ro
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$${MSSQL_SA_PASSWORD}" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  web:
    build:
      context: ./src/EnigmaChamber.Web
      dockerfile: Dockerfile
    container_name: enigmachamber-web
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=${DB_NAME:-EnigmaChamber};User Id=${DB_USER:-sa};Password=${SA_PASSWORD:-EnigmaChamber_StrongPass123!};TrustServerCertificate=True;MultipleActiveResultSets=true"
    ports:
      - "${WEB_PORT:-8080}:8080"
    depends_on:
      sqlserver:
        condition: service_healthy

volumes:
  sql_data:
